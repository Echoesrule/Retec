{% extends "admin/base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="admin-card">
    <div class="admin-card__head">
        <h1 class="admin-card__title">Change Password</h1>
    </div>
    <form method="POST" class="admin-form" style="max-width: 480px;">
        <div class="admin-form__group">
            <label class="admin-form__label">Current Password</label>
            <input type="password" name="current_password" class="admin-form__input" required autofocus>
        </div>
        <div class="admin-form__group">
            <label class="admin-form__label">New Password</label>
            <input type="password" name="new_password" class="admin-form__input" required minlength="6">
        </div>
        <div class="admin-form__group">
            <label class="admin-form__label">Confirm New Password</label>
            <input type="password" name="confirm_password" class="admin-form__input" required minlength="6">
        </div>
        <div class="admin-form__actions">
            <button type="submit" class="admin-btn admin-btn--primary">Update Password</button>
            <a href="{{ url_for('admin_dashboard') }}" class="admin-btn admin-btn--ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
